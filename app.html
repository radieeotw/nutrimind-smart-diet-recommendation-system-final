<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriMind — Smart Diet for Mental Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   NUTRIMIND DESIGN SYSTEM
   Aesthetic: Organic Brutalism meets Wellness Science
   Primary palette: Deep teal, warm sand, electric amber, sage green
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --void: #0b0f0e;
  --deep: #111815;
  --surface: #161d1a;
  --card: #1c2622;
  --raised: #223029;
  --border: #2d3d35;
  --border-light: #3d5248;

  --teal: #00c6a2;
  --teal-dim: #009e82;
  --teal-glow: rgba(0,198,162,0.15);
  --amber: #f5a623;
  --amber-dim: #c4841c;
  --amber-glow: rgba(245,166,35,0.12);
  --sage: #7ab89a;
  --coral: #e8735a;
  --sky: #5ab4d4;
  --lavender: #9b8ec4;
  --rose: #d4778a;

  --text-primary: #e8f0eb;
  --text-secondary: #9ab8a8;
  --text-muted: #587068;

  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 22px;
  --radius-xl: 32px;

  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --glow-teal: 0 0 30px rgba(0,198,162,0.2);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--void);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── ANIMATED BACKGROUND ── */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(ellipse 60% 50% at 10% 20%, rgba(0,198,162,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 90% 80%, rgba(245,166,35,0.05) 0%, transparent 60%),
    linear-gradient(rgba(45,61,53,0.3) 1px, transparent 1px),
    linear-gradient(90deg, rgba(45,61,53,0.3) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
  pointer-events: none;
}

#app { position: relative; z-index: 1; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

/* ═══════════════════════ TYPOGRAPHY ═══════════════════════ */
.font-display { font-family: 'DM Serif Display', serif; }
.font-ui { font-family: 'Syne', sans-serif; }

h1,h2,h3 { font-family: 'DM Serif Display', serif; line-height: 1.2; }
h4,h5,h6,label,button,.badge { font-family: 'Syne', sans-serif; }

/* ═══════════════════════ LAYOUT ═══════════════════════════ */
.shell {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 28px 16px;
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
  gap: 8px;
}

.logo {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 12px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}

.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--teal), var(--sage));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

.logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
.logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'Syne', sans-serif; }

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer; border: none; background: transparent;
  color: var(--text-secondary);
  font-family: 'Syne', sans-serif; font-size: 13.5px; font-weight: 500;
  width: 100%; text-align: left;
  transition: all 0.2s ease;
  position: relative;
}

.nav-item:hover { background: var(--card); color: var(--text-primary); }
.nav-item.active {
  background: linear-gradient(135deg, rgba(0,198,162,0.15), rgba(0,198,162,0.05));
  color: var(--teal);
  border: 1px solid rgba(0,198,162,0.2);
}

.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

.sidebar-spacer { flex: 1; }

.user-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  display: flex; align-items: center; gap: 10px;
}

.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal-dim), var(--sage));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--void);
  font-family: 'Syne', sans-serif;
}

/* ── MAIN CONTENT ── */
.main {
  padding: 32px 36px;
  overflow-y: auto;
  max-height: 100vh;
}

/* ── PAGE HEADER ── */
.page-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 32px;
}

.page-title { font-size: 32px; letter-spacing: -0.5px; }
.page-title span { color: var(--teal); font-style: italic; }
.page-subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 4px; font-family: 'DM Sans', sans-serif; }

/* ═══════════════════════ COMPONENTS ════════════════════════ */

/* ── CARDS ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
}

.card-glass {
  background: rgba(28,38,34,0.7);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
}

/* ── BUTTONS ── */
.btn {
  padding: 11px 22px;
  border-radius: var(--radius-sm);
  border: none; cursor: pointer;
  font-family: 'Syne', sans-serif; font-size: 13.5px; font-weight: 600;
  transition: all 0.2s ease;
  display: inline-flex; align-items: center; gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--teal), var(--teal-dim));
  color: var(--void);
  box-shadow: 0 4px 20px rgba(0,198,162,0.25);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,198,162,0.35); }

.btn-secondary {
  background: var(--raised);
  color: var(--text-primary);
  border: 1px solid var(--border-light);
}
.btn-secondary:hover { background: var(--border); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text-primary); border-color: var(--border-light); }

/* ── BADGES ── */
.badge {
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
  display: inline-flex; align-items: center; gap: 4px;
}
.badge-teal { background: rgba(0,198,162,0.15); color: var(--teal); border: 1px solid rgba(0,198,162,0.25); }
.badge-amber { background: rgba(245,166,35,0.15); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }
.badge-coral { background: rgba(232,115,90,0.15); color: var(--coral); border: 1px solid rgba(232,115,90,0.25); }
.badge-sage { background: rgba(122,184,154,0.15); color: var(--sage); border: 1px solid rgba(122,184,154,0.25); }
.badge-lavender { background: rgba(155,142,196,0.15); color: var(--lavender); border: 1px solid rgba(155,142,196,0.25); }

/* ── INPUTS ── */
.input {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 11px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  width: 100%;
  transition: border-color 0.2s;
  outline: none;
}
.input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,198,162,0.1); }
.input::placeholder { color: var(--text-muted); }

select.input { cursor: pointer; }

/* ── PROGRESS BAR ── */
.progress-bar {
  background: var(--surface);
  border-radius: 100px; height: 6px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, var(--teal), var(--sage));
  transition: width 0.8s ease;
}

/* ── TABS ── */
.tabs {
  display: flex; gap: 4px;
  background: var(--surface);
  padding: 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.tab {
  padding: 8px 18px; border-radius: 6px;
  cursor: pointer; border: none; background: transparent;
  font-family: 'Syne', sans-serif; font-size: 12.5px; font-weight: 600;
  color: var(--text-secondary);
  transition: all 0.2s;
}
.tab.active { background: var(--card); color: var(--teal); border: 1px solid rgba(0,198,162,0.2); }

/* ── MOOD CHIP ── */
.mood-chip {
  padding: 10px 18px;
  border-radius: 100px;
  cursor: pointer; border: 1.5px solid var(--border);
  background: var(--card);
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--text-secondary);
  transition: all 0.25s ease;
  display: flex; align-items: center; gap: 8px;
  user-select: none;
}
.mood-chip:hover { border-color: var(--border-light); color: var(--text-primary); transform: translateY(-1px); }
.mood-chip.selected {
  border-color: var(--teal);
  background: rgba(0,198,162,0.1);
  color: var(--teal);
  box-shadow: 0 0 0 3px rgba(0,198,162,0.07);
}

/* ── GI INDICATOR ── */
.gi-pill {
  padding: 3px 9px; border-radius: 100px;
  font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif;
}
.gi-low { background: rgba(0,198,162,0.15); color: var(--teal); }
.gi-medium { background: rgba(245,166,35,0.15); color: var(--amber); }
.gi-high { background: rgba(232,115,90,0.15); color: var(--coral); }

/* ── FOOD CARD ── */
.food-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  transition: all 0.25s ease;
  cursor: pointer;
  position: relative; overflow: hidden;
}
.food-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--teal), var(--sage));
  opacity: 0; transition: opacity 0.25s;
}
.food-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: var(--shadow); }
.food-card:hover::before { opacity: 1; }

.food-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.food-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
.food-macros { display: flex; gap: 10px; flex-wrap: wrap; }
.macro-pill {
  padding: 3px 8px; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border);
  font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 600;
  color: var(--text-secondary);
}

/* ── SCORE BAR ── */
.score-ring {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: conic-gradient(var(--teal) var(--pct), var(--surface) var(--pct));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif;
  color: var(--teal); position: relative;
}
.score-ring::before {
  content: ''; position: absolute;
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--card);
}
.score-ring span { position: relative; z-index: 1; }

/* ── STAT BOX ── */
.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex; flex-direction: column; gap: 4px;
}
.stat-label { font-size: 11.5px; color: var(--text-muted); font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; }
.stat-value { font-family: 'DM Serif Display', serif; font-size: 32px; }
.stat-delta { font-size: 12px; font-family: 'Syne', sans-serif; }
.delta-pos { color: var(--teal); }
.delta-neg { color: var(--coral); }

/* ── MEAL TIMELINE ── */
.timeline {
  position: relative;
  padding-left: 28px;
}
.timeline::before {
  content: '';
  position: absolute; left: 10px; top: 12px; bottom: 12px;
  width: 1px; background: linear-gradient(to bottom, var(--teal), transparent);
}
.timeline-item { margin-bottom: 24px; position: relative; }
.timeline-dot {
  position: absolute; left: -22px; top: 16px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 8px rgba(0,198,162,0.6);
}

/* ── BIOMARKER CARD ── */
.biomarker-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.biomarker-bar {
  height: 8px; border-radius: 100px;
  background: var(--surface); margin: 10px 0;
  position: relative; overflow: visible;
}
.bm-fill {
  height: 100%; border-radius: 100px;
  position: absolute; top: 0; left: 0;
  transition: width 1s ease;
}
.bm-marker {
  position: absolute; top: -3px; height: 14px; width: 3px;
  border-radius: 2px;
}

/* ── ALERT BOX ── */
.alert {
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  display: flex; align-items: flex-start; gap: 12px;
  font-size: 13.5px;
}
.alert-warn {
  background: rgba(245,166,35,0.08);
  border: 1px solid rgba(245,166,35,0.25);
  color: #e8c97a;
}
.alert-info {
  background: rgba(0,198,162,0.08);
  border: 1px solid rgba(0,198,162,0.2);
  color: var(--text-secondary);
}
.alert-danger {
  background: rgba(232,115,90,0.08);
  border: 1px solid rgba(232,115,90,0.25);
  color: #e8a090;
}

/* ── GRID HELPERS ── */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }

.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.flex-wrap { flex-wrap: wrap; }
.flex-1 { flex: 1; }

.mt-1 { margin-top: 4px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.mt-8 { margin-top: 32px; }
.mb-1 { margin-bottom: 4px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }

.text-sm { font-size: 13px; }
.text-xs { font-size: 11.5px; }
.text-muted { color: var(--text-muted); }
.text-secondary { color: var(--text-secondary); }
.text-teal { color: var(--teal); }
.text-amber { color: var(--amber); }
.text-coral { color: var(--coral); }
.font-bold { font-weight: 700; }
.text-right { text-align: right; }

.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* ═══════════════════ ONBOARDING ═══════════════════════════ */
.onboarding {
  min-height: 100vh;
  display: flex; align-items: stretch;
}
.ob-left {
  width: 420px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 48px 40px;
  display: flex; flex-direction: column; justify-content: center;
}
.ob-right {
  flex: 1;
  padding: 40px 48px;
  display: flex; flex-direction: column; justify-content: center;
  overflow-y: auto;
}

.ob-step-indicator {
  display: flex; gap: 8px; margin-bottom: 40px;
}
.ob-step {
  height: 3px; flex: 1; border-radius: 100px;
  background: var(--border);
  transition: background 0.3s;
}
.ob-step.done { background: var(--teal); }
.ob-step.active { background: linear-gradient(90deg, var(--teal), var(--sage)); }

.ob-number {
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
  color: var(--teal); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px;
}
.ob-title { font-family: 'DM Serif Display', serif; font-size: 38px; line-height: 1.15; margin-bottom: 16px; }
.ob-title em { color: var(--teal); font-style: italic; }
.ob-desc { color: var(--text-secondary); line-height: 1.7; font-size: 15px; }

.form-group { margin-bottom: 20px; }
.form-label {
  display: block; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
  color: var(--text-secondary); letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 8px;
}

/* ═══════════════════ ANIMATIONS ══════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse-ring {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,198,162,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(0,198,162,0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.animate-up { animation: fadeUp 0.5s ease both; }
.animate-up-delay-1 { animation: fadeUp 0.5s ease 0.1s both; }
.animate-up-delay-2 { animation: fadeUp 0.5s ease 0.2s both; }

.loading-spinner {
  width: 32px; height: 32px; border-radius: 50%;
  border: 3px solid var(--border);
  border-top-color: var(--teal);
  animation: spin 0.8s linear infinite;
}

/* ═══════════════════ FOOD DETAIL MODAL ═══════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xl);
  padding: 32px;
  max-width: 560px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  animation: fadeUp 0.3s ease;
}

/* ═══════════════════ CHART STYLES ═══════════════════════ */
.radar-chart { display: flex; justify-content: center; }
.nutrient-bar-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.nutrient-bar-label { width: 120px; font-size: 12px; color: var(--text-secondary); font-family: 'Syne', sans-serif; }
.nutrient-bar-track { flex: 1; height: 8px; background: var(--surface); border-radius: 100px; overflow: hidden; }
.nutrient-bar-fill { height: 100%; border-radius: 100px; transition: width 1s ease; }
.nutrient-bar-val { width: 40px; font-size: 11px; color: var(--text-muted); text-align: right; font-family: 'Syne', sans-serif; }

/* ═══════════════════ SCROLLABLE REGIONS ═════════════════ */
.scroll-x { overflow-x: auto; padding-bottom: 8px; }
.scroll-x::-webkit-scrollbar { height: 3px; }

/* ═══════════════════ AVOID FOODS PANEL ═════════════════ */
.avoid-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: var(--radius-sm);
  background: rgba(232,115,90,0.08);
  border: 1px solid rgba(232,115,90,0.2);
  font-size: 13px; color: #e8a090; font-family: 'Syne', sans-serif;
}

/* ═══════════════════ RESEARCH TAG ══════════════════════ */
.research-tag {
  background: rgba(155,142,196,0.08);
  border: 1px solid rgba(155,142,196,0.2);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 12px; color: var(--lavender);
  line-height: 1.5;
}
.research-tag strong { color: #bfb3e0; }

/* ═══════════════════ RESPONSIVE ════════════════════════ */
@media (max-width: 900px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .grid-4 { grid-template-columns: repeat(2,1fr); }
  .ob-left { display: none; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════════════════
// NUTRIMIND — COMPLETE PROTOTYPE
// Data: 150+ foods, 8 biomarkers, drug interactions, full meal planner
// ════════════════════════════════════════════════════════════════════

// ── EMBEDDED DATABASE (subset of full 150-food dataset) ──────────────

function getGIClass(gi) {
  if (gi === 0) return { label:"None", cls:"gi-low" };
  if (gi <= 40) return { label:`GI ${gi} Low`, cls:"gi-low" };
  if (gi <= 65) return { label:`GI ${gi} Med`, cls:"gi-medium" };
  return { label:`GI ${gi} High`, cls:"gi-high" };
}

function recommendFoods(moods, dietType, conditions, medications, biomarkers, bmi) {
  const moodWeights = {
    depressed:  { tryptophan:1, omega3:1, folate:1, b12:1, vitamin_d:1 },
    anxious:    { magnesium:1, zinc:1, gi_score:1, fiber:0.8, probiotics:0.8 },
    stressed:   { magnesium:1, omega3:0.8, antioxidants:0.8 },
    fatigued:   { iron:1, b12:1, magnesium:0.7, vitamin_d:0.8, protein:0.8 },
    brain_fog:  { omega3:1, antioxidants:1, folate:0.7, zinc:0.6 },
    irritable:  { magnesium:1, tryptophan:0.8, gi_score:0.8, fiber:0.6 },
  };

  const drugFlags = {
    warfarin: ["f003","f011","f029","f040"],
    maois: ["f009","f030","f039"],
    blood_thinners: ["f007","f029","f033","f036"],
  };
  const flagged = new Set(medications.flatMap(m => drugFlags[m] || []));

  return FOODS_DB
    .filter(f => f.diet.includes(dietType))
    .filter(f => !conditions.some(c => (f.avoid_if||[]).includes(c)))
    .filter(f => !flagged.has(f.id))
    .map(f => {
      let score = 0;
      // Mood match
      const moodMatches = moods.filter(m => f.mood_boost.includes(m)).length;
      score += moodMatches * 25;
      // Penalise if in mood_avoid
      const moodAvoid = moods.filter(m => (f.mood_avoid||[]).includes(m)).length;
      score -= moodAvoid * 20;
      // GI penalty for anxiety/irritable
      if ((moods.includes("anxious")||moods.includes("irritable")) && f.gi > 65) score -= 15;
      // BMI calorie fit
      if (bmi) {
        const tgt = bmi > 25 ? 140 : bmi < 18.5 ? 200 : 160;
        score -= Math.abs(f.cal - tgt) / 20;
      }
      // Biomarker boosts
      const bm_map = {
        vitamin_d: ["f030","f033","f034","f031"],
        b12: ["f033","f034","f035","f030","f031"],
        iron: ["f001","f021","f027","f034","f039"],
        hba1c: ["f022","f015","f025","f017"],
        crp: ["f010","f025","f028","f029","f033"],
        omega3_index: ["f033","f025","f028","f029"],
        ferritin: ["f001","f021","f023","f034"],
      };
      Object.entries(biomarkers).forEach(([marker, val]) => {
        const bm = BIOMARKERS.find(b => b.id === marker);
        if (!bm) return;
        const isLow = parseFloat(val) < bm.low;
        if (isLow && (bm_map[marker]||[]).includes(f.id)) score += 20;
      });
      return { ...f, score: Math.max(0, Math.round(score)) };
    })
    .sort((a,b) => b.score - a.score);
}

function buildMealPlan(recs, dietType, moods) {
  const meals = {
    breakfast: { label:"Breakfast", time:"7:30 AM", icon:"🌅", cats:["grain","fruit","dairy","beverage","nut","seed"], foods:[] },
    midmorning: { label:"Mid-Morning", time:"10:30 AM", icon:"☕", cats:["fruit","nut","seed","beverage"], foods:[] },
    lunch: { label:"Lunch", time:"1:00 PM", icon:"🍱", cats:["grain","legume","vegetable","fish","meat","fat","spice","herb"], foods:[] },
    evening: { label:"Evening Snack", time:"4:30 PM", icon:"🌿", cats:["fruit","nut","seed","beverage","other"], foods:[] },
    dinner: { label:"Dinner", time:"7:30 PM", icon:"🌙", cats:["grain","legume","vegetable","fish","meat","spice","herb"], foods:[] },
  };
  const used = new Set();
  Object.entries(meals).forEach(([key, meal]) => {
    const limit = (key==="lunch"||key==="dinner") ? 4 : 2;
    const suitable = recs.filter(f => meal.cats.includes(f.cat) && !used.has(f.id));
    meal.foods = suitable.slice(0, limit);
    meal.foods.forEach(f => used.add(f.id));
    meal.total_cal = meal.foods.reduce((s,f) => s + f.cal, 0);
    meal.total_pro = meal.foods.reduce((s,f) => s + f.pro, 0);
    meal.avg_gi = meal.foods.length ? Math.round(meal.foods.reduce((s,f) => s + f.gi, 0) / meal.foods.length) : 0;
  });
  return meals;
}

function renderMoodChart() {
  const maxScore = 100;
  const days = state.moodHistory;
  const bars = days.map((d, i) => {

    const h = isToday ? 0 : Math.max(8, (d.score / maxScore) * 80);
    const color = isToday ? "var(--border)" : d.score > 60 ? "var(--teal)" : d.score > 45 ? "var(--amber)" : "var(--coral)";
    return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1">
      <div style="height:80px;display:flex;align-items:flex-end">

      <div style="font-size:10px;color:var(--text-muted);font-family:'Syne',sans-serif;font-weight:600">${d.date}</div>

}

function renderBiomarkers() {

      return `

          ${hasVal ? `<span class="badge" style="background:rgba(0,0,0,0.2);color:${statusColor};border-color:${statusColor}30">${statusLabel}</span>` : `<span class="badge badge-sage">Not entered</span>`}
        </div>
        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">${b.impact}</div>
        ${hasVal ? `
        <div class="biomarker-bar">
          <div class="bm-fill" style="width:${pct}%;background:${statusColor}"></div>
        </div>
        <div class="flex justify-between text-xs text-muted mb-2">

    }).join("")}

function getBmFoods(bmId, n=3) {

    iron: ["f001","f021","f027","f034"],
    thyroid_tsh: ["f030","f033","f034"],
    hba1c: ["f022","f015","f025","f017"],
    crp: ["f010","f025","f028","f033"],
    omega3_index: ["f033","f025","f028","f029"],

        <div class="flex gap-2 items-center mb-2">
          <span style="font-size:16px;opacity:0.5">${s.from}</span>
          <span style="color:var(--text-muted);font-size:12px">→</span>
          <span style="font-size:16px">${s.to}</span>
          <div>
            <span style="font-size:11px;color:var(--coral);text-decoration:line-through">${s.avoid}</span>
            <span style="font-size:11px;color:var(--teal);margin-left:4px">→ ${s.swap}</span>
          </div>
        </div>
        <div style="font-size:12px;color:var(--text-secondary)">${s.reason}</div>
      </div>`).join("")}
    </div>
  </div>`}`;
}

// ════════════════════════════════════════════════════════════
// HELPER FUNCTIONS
// ════════════════════════════════════════════════════════════
function classifyProfile() {
  const profiles = {
    depressed: { label:"Neurotransmitter Depleted", emoji:"🔵" },
    anxious: { label:"Stress Reactive", emoji:"🟡" },
    stressed: { label:"Cortisol Dysregulated", emoji:"🟠" },
    fatigued: { label:"Energy Deficient", emoji:"🔴" },
    brain_fog: { label:"Neuroinflammatory", emoji:"🟣" },
    irritable: { label:"Glycemic Unstable", emoji:"🟤" },
  };
  if (!state.moods.length) return { label:"Balanced", emoji:"🟢" };
  const counts = {};
  state.moods.forEach(m => { counts[m] = (counts[m]||0) + 1; });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  return profiles[top[0]] || { label:"Mixed Profile", emoji:"⚪" };
}

function getDeficiencies() {
  return BIOMARKERS.filter(b => {
    const v = parseFloat(state.biomarker_vals[b.id]);
    return !isNaN(v) && v < b.low;
  });
}

function getDrugWarnings() {
  const warnings = {
    warfarin: "Warfarin + Vitamin K foods (spinach, broccoli) — monitor INR carefully",
    maois: "MAOIs + tyramine foods (banana, dark chocolate) — risk of hypertensive crisis",
    blood_thinners: "Blood thinners + omega-3 foods — may increase bleeding risk",
    statins: "Statins + pomegranate — may increase statin levels",
  };
  return state.medications.flatMap(m => warnings[m] ? [warnings[m]] : []);
}

function getTimeOfDay() {
  const h = new Date().getHours();
  return h < 12 ? "morning" : h < 17 ? "afternoon" : "evening";
}

function calculateTDEE(bmi, age, gender) {
  const weight = bmi ? bmi * (1.65**2) : 65;
  const height = 165;
  if (gender === "male") return Math.round((10*weight + 6.25*height - 5*age + 5) * 1.375);
  return Math.round((10*weight + 6.25*height - 5*age - 161) * 1.375);
}

function animateNumbers() {
  document.querySelectorAll("[data-countup]").forEach(el => {
    const target = parseInt(el.dataset.countup);
    if (!target) return;
    let current = 0;
    const step = Math.ceil(target / 20);
    const timer = setInterval(() => {
      current = Math.min(current + step, target);
      el.textContent = current;
      if (current >= target) clearInterval(timer);
    }, 50);
  });
}

// ════════════════════════════════════════════════════════════
// EVENT HANDLING
// ════════════════════════════════════════════════════════════
function attachEvents() {
  // Onboarding navigation
  const nextBtn = document.getElementById("ob-next");
  if (nextBtn) nextBtn.addEventListener("click", () => {
    if (state.ob_step === 1) {
      setState({ profile: {
        name: document.getElementById("inp-name")?.value || "",
        age: parseInt(document.getElementById("inp-age")?.value) || 22,
        gender: document.getElementById("inp-gender")?.value || "female",
        diet: document.getElementById("inp-diet")?.value || "vegetarian",
        bmi: parseFloat(document.getElementById("inp-bmi")?.value) || null,
      }});
    } else if (state.ob_step === 3) {
      // nothing to save — already saved on click
    } else if (state.ob_step === 4) {
      // Save biomarker values
      const bv = {};
      BIOMARKERS.forEach(b => {
        const v = document.getElementById(`bm-${b.id}`)?.value;
        if (v) bv[b.id] = v;
      });
      // Generate recommendations
      const recs = recommendFoods(state.moods, state.profile.diet, state.conditions, state.medications, bv, state.profile.bmi);
      const plan = buildMealPlan(recs, state.profile.diet, state.moods);
      setState({ biomarker_vals: bv, recommendations: recs, mealPlan: plan, page: "dashboard", ob_step: 1 });
      return;
    }
    if (state.ob_step < 4) setState({ ob_step: state.ob_step + 1 });
  });

  const backBtn = document.getElementById("ob-back");
  if (backBtn) backBtn.addEventListener("click", () => {
    if (state.ob_step > 1) setState({ ob_step: state.ob_step - 1 });
  });

  // Mood chips (onboarding + mood page)
  document.querySelectorAll("[data-mood]").forEach(el => {
    el.addEventListener("click", () => {
      const m = el.dataset.mood;
      const moods = state.moods.includes(m)
        ? state.moods.filter(x => x !== m)
        : [...state.moods, m];
      setState({ moods });
    });
  });

  // Condition chips
  document.querySelectorAll("[data-condition]").forEach(el => {
    el.addEventListener("click", () => {
      const c = el.dataset.condition;
      const conditions = state.conditions.includes(c)
        ? state.conditions.filter(x => x !== c)
        : [...state.conditions, c];
      setState({ conditions });
    });
  });

  // Medication chips
  document.querySelectorAll("[data-medication]").forEach(el => {
    el.addEventListener("click", () => {
      const m = el.dataset.medication;
      const meds = state.medications.includes(m)
        ? state.medications.filter(x => x !== m)
        : [...state.medications, m];
      setState({ medications: meds });
    });
  });

  // Nav
  document.querySelectorAll("[data-page]").forEach(el => {
    el.addEventListener("click", () => setState({ page: el.dataset.page }));
  });

  // Tabs
  document.querySelectorAll("[data-tab]").forEach(el => {
    el.addEventListener("click", () => setState({ activeTab: el.dataset.tab }));
  });

  // Generate plan button
  const genBtn = document.getElementById("generate-plan");
  if (genBtn) genBtn.addEventListener("click", () => {
    const recs = recommendFoods(state.moods, state.profile.diet, state.conditions, state.medications, state.biomarker_vals, state.profile.bmi);
    const plan = buildMealPlan(recs, state.profile.diet, state.moods);
    setState({ recommendations: recs, mealPlan: plan, page: "recommendations" });
  });

  // Food cards → modal
  document.querySelectorAll("[data-food]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const food = FOODS_DB.find(f => f.id === el.dataset.food);
      if (!food) return;
      const existing = document.getElementById("modal-overlay");
      if (existing) existing.remove();
      const scored = state.recommendations.find(r => r.id === food.id);
      document.body.insertAdjacentHTML("beforeend", renderFoodModal(scored || food));
      document.getElementById("modal-overlay").addEventListener("click", e => {
        if (e.target.id === "modal-overlay") document.getElementById("modal-overlay").remove();
      });
    });
  });

  // Save biomarker from dashboard
  document.querySelectorAll("[data-save-bm]").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.dataset.saveBm;
      const val = document.getElementById(`bm-dash-${id}`)?.value;
      if (val) {
        const bv = { ...state.biomarker_vals, [id]: val };
        const recs = recommendFoods(state.moods, state.profile.diet, state.conditions, state.medications, bv, state.profile.bmi);
        const plan = buildMealPlan(recs, state.profile.diet, state.moods);
        setState({ biomarker_vals: bv, recommendations: recs, mealPlan: plan });
      }
    });
  });
}
